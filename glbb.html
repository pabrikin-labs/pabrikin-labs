<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLBB Simulation - Pabrikin Labs</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-pabrikin.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .simulation-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-field label {
            font-family: 'Rajdhani', sans-serif;
            color: var(--accent-cyan);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .input-field input {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 10px;
            color: #fff;
            border-radius: 6px;
            font-family: 'Share Tech Mono';
            width: 100px;
        }
        .sim-btn {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Rajdhani';
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .sim-btn:hover {
            background: #60a5fa;
        }
        .canvas-container {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        #simulation-canvas {
            width: 100%;
            height: 300px;
            display: block;
        }
        .graph-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .graph-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .graph-card h4 {
            font-family: 'Rajdhani';
            color: var(--accent-yellow);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .back-btn {
            background: var(--panel2);
            color: var(--accent-blue);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Rajdhani';
            text-transform: uppercase;
            margin-top: 20px;
        }
        .back-btn:hover {
            background: rgba(56, 189, 248, 0.1);
        }
        .formula-display {
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'Share Tech Mono';
            color: var(--accent-yellow);
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <span class="logo-wrapper" id="logo-place"></span>
            Pabrikin Labs - GLBB Simulation
        </div>
        <nav class="nav-menu">
            <div class="nav-item" onclick="window.location.href='index.html'">BACK TO PORTFOLIO</div>
        </nav>
    </header>

    <div class="main-content">
        <div class="simulation-container">
            <div class="page-title">Uniformly Accelerated Motion (GLBB)</div>
            
            <div class="formula-display">
                s = v₀t + ½at²
            </div>

            <div class="input-group">
                <div class="input-field">
                    <label for="v0">Initial Velocity (v₀)</label>
                    <input type="number" id="v0" value="0" step="0.1">
                </div>
                <div class="input-field">
                    <label for="a">Acceleration (a)</label>
                    <input type="number" id="a" value="2" step="0.1">
                </div>
                <div class="input-field">
                    <label for="t">Time (t)</label>
                    <input type="number" id="t" value="5" step="0.1">
                </div>
            </div>

            <button class="sim-btn" id="start-sim">Start Simulation</button>

            <div class="canvas-container">
                <canvas id="simulation-canvas"></canvas>
            </div>

            <div class="graph-container">
                <div class="graph-card">
                    <h4>Position vs Time</h4>
                    <canvas id="position-chart"></canvas>
                </div>
                <div class="graph-card">
                    <h4>Velocity vs Time</h4>
                    <canvas id="velocity-chart"></canvas>
                </div>
            </div>

            <button class="back-btn" onclick="window.location.href='index.html#projects'">← Back</button>
        </div>
    </div>

    <footer>
        <div class="footer-status">
            <div class="status-indicator"><div class="dot"></div>SIMULATION STATUS: READY</div>
            <span>|</span> <span>LOCATION: CILEGON, BANTEN</span> <span>|</span>
            <span id="live-clock">00:00:00</span>
        </div>
        <div class="footer-copyright">
            © 2026 <a href="https://linktr.ee/pabrikin" target="_blank" class="footer-link">Pabrikin Labs</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // GLBB Simulation Script
        const canvas = document.getElementById('simulation-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-sim');
        const v0Input = document.getElementById('v0');
        const aInput = document.getElementById('a');
        const tInput = document.getElementById('t');

        let animationId;
        let isRunning = false;

        // Resize canvas
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Charts
        const positionChart = new Chart(document.getElementById('position-chart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Position (m)',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { title: { display: true, text: 'Time (s)' } },
                    y: { title: { display: true, text: 'Position (m)' } }
                }
            }
        });

        const velocityChart = new Chart(document.getElementById('velocity-chart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Velocity (m/s)',
                    data: [],
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34, 197, 94, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { title: { display: true, text: 'Time (s)' } },
                    y: { title: { display: true, text: 'Velocity (m/s)' } }
                }
            }
        });

        function calculatePosition(t, v0, a) {
            return v0 * t + 0.5 * a * t * t;
        }

        function calculateVelocity(t, v0, a) {
            return v0 + a * t;
        }

        function drawObject(x) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw track
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, canvas.height / 2);
            ctx.lineTo(canvas.width - 50, canvas.height / 2);
            ctx.stroke();
            
            // Draw object
            const objX = 50 + (x / 100) * (canvas.width - 100); // Scale position
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.arc(objX, canvas.height / 2, 10, 0, 2 * Math.PI);
            ctx.fill();
            
            // Draw position label
            ctx.fillStyle = '#e2e8f0';
            ctx.font = '12px Share Tech Mono';
            ctx.fillText(`s = ${x.toFixed(1)} m`, objX - 20, canvas.height / 2 - 20);
        }

        function updateCharts(time, position, velocity) {
            positionChart.data.labels.push(time.toFixed(1));
            positionChart.data.datasets[0].data.push(position.toFixed(1));
            positionChart.update();

            velocityChart.data.labels.push(time.toFixed(1));
            velocityChart.data.datasets[0].data.push(velocity.toFixed(1));
            velocityChart.update();
        }

        function startSimulation() {
            if (isRunning) return;
            isRunning = true;
            
            const v0 = parseFloat(v0Input.value) || 0;
            const a = parseFloat(aInput.value) || 0;
            const totalTime = parseFloat(tInput.value) || 5;
            
            // Reset charts
            positionChart.data.labels = [];
            positionChart.data.datasets[0].data = [];
            velocityChart.data.labels = [];
            velocityChart.data.datasets[0].data = [];
            
            let currentTime = 0;
            const timeStep = 0.1;
            
            function animate() {
                if (currentTime >= totalTime) {
                    isRunning = false;
                    return;
                }
                
                const position = calculatePosition(currentTime, v0, a);
                const velocity = calculateVelocity(currentTime, v0, a);
                
                drawObject(position);
                updateCharts(currentTime, position, velocity);
                
                currentTime += timeStep;
                animationId = requestAnimationFrame(animate);
            }
            
            animate();
        }

        startBtn.addEventListener('click', startSimulation);

        // Initial draw
        drawObject(0);
    </script>
</body>
</html>
