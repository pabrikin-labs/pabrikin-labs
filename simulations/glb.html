<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Simulation | Pabrikin Labs</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo-pabrikin.svg">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .sim-container { max-width: 820px; margin: 40px auto; padding: 20px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; }
    .sim-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .sim-row label { width: 120px; color: var(--text-dim); font-family: 'Share Tech Mono'; }
    .sim-row input { flex: 1; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; }
    .sim-result { margin-top: 18px; font-family: 'Rajdhani'; font-size: 1.3rem; color: var(--accent-yellow); }
    .btn-back { all: unset; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background: var(--accent-blue); color: #000; padding: 10px 16px; border-radius: 8px; font-weight: 700; margin-bottom: 18px; }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <span class="logo-wrapper" id="logo-place"></span>
      GLB Simulation
    </div>
  </header>

  <main class="main-content" style="padding: 25px 40px;">
    <div class="sim-container">
      <button class="btn-back" onclick="window.location.href='../index.html#page-projects'">← Back</button>
      <h2 class="page-title" style="margin-top:0;">GLB - Uniform Linear Motion</h2>
      <p style="color: var(--text-dim);">Enter velocity and time to calculate displacement (s = v × t).</p>

      <div class="sim-row">
        <label>Velocity (m/s)</label>
        <input id="input-v" type="number" min="0" step="0.1" value="5">
      </div>

      <div class="sim-row">
        <label>Time (s)</label>
        <input id="input-t" type="number" min="0" step="0.1" value="10">
      </div>

      <button class="btn-back" id="btn-calc" style="background: var(--accent-green); margin-top: 5px;">Calculate Displacement</button>

      <div class="sim-result" id="sim-result">Displacement: 0 m</div>
    </div>
  </main>

  <script>
    document.getElementById('btn-calc').addEventListener('click', () => {
      const v = parseFloat(document.getElementById('input-v').value) || 0;
      const t = parseFloat(document.getElementById('input-t').value) || 0;
      const s = (v * t).toFixed(2);
      document.getElementById('sim-result').innerText = `Displacement: ${s} m`;
    });
  </script>
</body>
</html>
